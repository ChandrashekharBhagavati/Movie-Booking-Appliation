<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Select Seats</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet"
  />

  <style>

    .seat {
      width: 50px;
      height: 50px;
      margin: 5px;
      border-radius: 5px;
      background-color: #e0e0e0;
      border: 1px solid #ccc;
      cursor: pointer;
      transition: background-color 0.3s ease;
      text-align: center;
      line-height: 50px;
      flex-shrink: 0;
      user-select: none;
    }

    .seat.selected {
      background-color: #28a745;
      color: white;
    }

    .seat.occupied {
      background-color: #6c757d;
      cursor: not-allowed;
      color: white;
    }

    .seat.recommended {
    background-color: #FFD957;
  color: white;
    }

    .row-label {
      font-weight: bold;
      margin-right: 10px;
      width: 30px;
      display: inline-block;
      flex-shrink: 0;
    }

    .screen {
      width: 100%;
      max-width: 500px;
      background-color: #dee2e6;
      color: #333;
      text-align: center;
      padding: 10px;
      border-radius: 50px;
      margin-bottom: 30px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    #seatContainer {
      overflow-x: auto;
      width: 100%;
    }

    @media (max-width: 576px) {

      .seat {
        width: 36px;
        height: 36px;
        line-height: 36px;
        font-size: 12px;
        margin: 3px;
      }

      .row-label {
        width: 20px;
        font-size: 14px;
      }

      .screen {
        font-size: 14px;
      }
    }

  </style>
</head>

<body>

<div class="container mt-5" id="mainContent" style="display: none;">

  <h3 class="mb-4 text-center">
    🎟️ Select Your Seats for:
    <strong id="movieTitle">Loading...</strong>
  </h3>

  <!-- Recommendation Controls -->
  <div class="d-flex justify-content-center align-items-center mb-4 flex-wrap gap-3">
    <div class="d-flex gap-2">

      <input
              type="number"
              id="recommendSeatCount"
              class="form-control"
              placeholder="Seats"
              min="1"
              max="8"
              style="width: 100px;"
      />

      <button class="btn btn-primary" onclick="recommendSeats()">
        Recommend Seats
      </button>

      <button class="btn btn-outline-secondary" onclick="clearRecommendedSeats()">
        Clear
      </button>

    </div>

  </div>

  <div class="d-flex flex-column align-items-center">

    <!-- Screen -->
    <div class="screen">
      SCREEN
    </div>

    <!-- Seat Layout -->
    <div id="seatContainer" class="d-flex flex-column align-items-center">      <!-- Rows and seats dynamically added -->
    </div>

    <button class="btn btn-success mt-4" onclick="confirmBooking()">
      Confirm Booking
    </button>

  </div>
</div>

<!-- Booking Confirmation Modal -->
<div class="modal fade"
     id="bookingConfirmModal"
     tabindex="-1"
     aria-labelledby="bookingConfirmLabel"
     aria-hidden="true">

  <div class="modal-dialog">
    <div class="modal-content rounded-4">

      <div class="modal-header">

        <h5 class="modal-title" id="bookingConfirmLabel">
          Confirm Your Booking
        </h5>

        <button type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close">
        </button>

      </div>

      <div class="modal-body" id="confirmModalBody"></div>

      <div class="modal-footer">

        <button type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal">
          Cancel
        </button>

        <button type="button"
                id="confirmProceedBtn"
                class="btn btn-success">
          Confirm Booking
        </button>

      </div>
    </div>
  </div>
</div>

<!-- Loader -->
<div id="loader"
     class="d-flex justify-content-center align-items-center"
     style="height: 100vh;">

  <div class="spinner-border text-primary" role="status">
    <span class="visually-hidden">Loading...</span>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

  const seatContainer = document.getElementById("seatContainer");
  const movieTitleEl = document.getElementById("movieTitle");

  const urlParams = new URLSearchParams(window.location.search);

  const movieId = urlParams.get("movieId");
  const movieName = urlParams.get("movieName");
  const date = urlParams.get("date");
  const time = urlParams.get("time");

  const selectedSeats = new Set();

  // Set movie title
  movieTitleEl.textContent = movieName || "Unknown Movie";

  fetch(`/api/seats?movieId=${movieId}&date=${date}&time=${time}`)
    .then(response => response.json())
    .then(bookedSeatList => {

      // Hide loader, show content
      document.getElementById("loader").style.display = "none";
      document.getElementById("mainContent").style.display = "block";

      const bookedSet = new Set(
        bookedSeatList
          .filter(seat => seat.booked === true)
          .map(seat => seat.seatNumber)
      );

      const rows = "ABCDEFGH";

      for (let row of rows) {

        const rowDiv = document.createElement("div");

        rowDiv.classList.add(
          "d-flex",
          "align-items-center"
        );

        const label = document.createElement("span");

        label.classList.add("row-label");
        label.textContent = row;

        rowDiv.appendChild(label);

        for (let i = 1; i <= 8; i++) {

          const seatNum = `${row}${i}`;

          const seatDiv = document.createElement("div");

          seatDiv.classList.add("seat");

          seatDiv.textContent = i;

          seatDiv.dataset.seat = seatNum;

          if (bookedSet.has(seatNum)) {

            seatDiv.classList.add("occupied");

          } else {

            seatDiv.addEventListener("click", () => {

              const fullSeat = `${row}${i}`;

              seatDiv.classList.remove("recommended");

              if (seatDiv.classList.contains("selected")) {

                seatDiv.classList.remove("selected");

                selectedSeats.delete(fullSeat);

              } else {

                seatDiv.classList.add("selected");

                selectedSeats.add(fullSeat);
              }
            });
          }

          rowDiv.appendChild(seatDiv);
        }

        seatContainer.appendChild(rowDiv);
      }
    })
    .catch(error => {

      console.error("Error loading seats:", error);

      document.getElementById("loader").style.display = "none";

      document.getElementById("mainContent").style.display = "block";

      seatContainer.innerHTML =
        "<p class='text-danger'>Failed to load seats.</p>";
    });

  function recommendSeats() {

    const seatCount = parseInt(
      document.getElementById("recommendSeatCount").value
    );

    if (!seatCount || seatCount <= 0) {

      alert("Please enter valid number of seats");

      return;
    }

    clearRecommendedSeats();

    fetch(
      `/api/seats/recommend?movieId=${movieId}&date=${date}&time=${time}&count=${seatCount}`
    )
      .then(response => response.json())
      .then(recommendedSeats => {

        recommendedSeats.forEach(seatNumber => {

          const seatElement = document.querySelector(
            `[data-seat='${seatNumber}']`
          );

          if (
            seatElement &&
            !seatElement.classList.contains("occupied")
          ) {

            seatElement.classList.add("recommended");

            seatElement.classList.add("selected");

            selectedSeats.add(seatNumber);
          }
        });
      })
      .catch(error => {

        console.error("Error recommending seats:", error);

        alert("Failed to recommend seats");
      });
  }

  function clearRecommendedSeats() {

    document.querySelectorAll(".seat.recommended")
      .forEach(seat => {

        seat.classList.remove("recommended");

        seat.classList.remove("selected");

        selectedSeats.delete(seat.dataset.seat);
      });
  }

  function confirmBooking() {

    const selected = Array.from(selectedSeats);

    const modalBody =
      document.getElementById("confirmModalBody");

    if (selected.length === 0) {

      modalBody.innerHTML = `
        <p class="text-danger">
          ⚠️ Please select at least one seat.
        </p>
      `;

      document.getElementById('confirmProceedBtn')
        .style.display = "none";

    } else {

      modalBody.innerHTML = `
        <p>You have selected the following seat(s):</p>

        <strong>${selected.join(", ")}</strong>

        <p>Do you want to continue with the booking?</p>
      `;

      document.getElementById('confirmProceedBtn')
        .style.display = "inline-block";
    }

    const confirmModal =
      new bootstrap.Modal(
        document.getElementById('bookingConfirmModal')
      );

    confirmModal.show();
  }

  document.getElementById('confirmProceedBtn')
    .addEventListener('click', () => {

      const seatParam =
        Array.from(selectedSeats).join(",");

      window.location.href =
        `/booking-details?movieId=${movieId}` +
        `&movieName=${encodeURIComponent(movieName)}` +
        `&date=${date}` +
        `&time=${time}` +
        `&seats=${seatParam}`;
    });

</script>

</body>
</html>
